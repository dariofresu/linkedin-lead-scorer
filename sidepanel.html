<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedIn Lead Scorer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f3f4f6; color: #111; font-size: 14px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* Header */
  header { background: #0a66c2; color: white; padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .header-logo { font-size: 18px; margin-right: 8px; }
  .header-title { font-size: 14px; font-weight: 600; }
  .header-sub { font-size: 10px; opacity: 0.75; margin-top: 1px; }
  .icon-btn { background: none; border: none; cursor: pointer; color: white; padding: 5px; border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
  .icon-btn:hover { background: rgba(255,255,255,0.2); }

  /* Scrollable content area */
  main { flex: 1; overflow-y: auto; padding: 14px; }

  /* Cards */
  .card { background: white; border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px; margin-bottom: 10px; }

  /* Status */
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-green { background: #16a34a; box-shadow: 0 0 0 3px rgba(22,163,74,0.15); }
  .dot-red { background: #dc2626; }
  .dot-amber { background: #d97706; }

  /* Buttons */
  button { font-family: inherit; font-size: 13px; cursor: pointer; border-radius: 7px; padding: 8px 14px; border: 1px solid #d1d5db; background: white; color: #374151; transition: all 0.15s; font-weight: 400; }
  button:hover:not(:disabled) { background: #f9fafb; }
  button:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-primary { background: #0a66c2; color: white; border-color: #0a66c2; font-weight: 500; }
  .btn-primary:hover:not(:disabled) { background: #0958a8; }
  .btn-green { background: #16a34a; color: white; border-color: #16a34a; font-weight: 500; }
  .btn-green:hover:not(:disabled) { background: #15803d; }
  .btn-full { width: 100%; padding: 10px; }
  .btn-danger { background: white; color: #dc2626; border-color: #fca5a5; }
  .btn-danger:hover { background: #fef2f2; }

  /* Inputs */
  input, select { font-family: inherit; font-size: 13px; width: 100%; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 7px; background: white; color: #111; outline: none; }
  input:focus, select:focus { border-color: #0a66c2; box-shadow: 0 0 0 3px rgba(10,102,194,0.1); }
  label { font-size: 11px; font-weight: 600; color: #6b7280; display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em; }
  .hint { font-size: 11px; color: #9ca3af; margin-top: 5px; line-height: 1.4; }

  /* Progress */
  .progress-wrap { background: #e5e7eb; border-radius: 999px; height: 5px; overflow: hidden; }
  .progress-fill { height: 100%; background: #0a66c2; border-radius: 999px; transition: width 0.35s ease; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .stat-card { background: white; border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px 6px; text-align: center; }
  .stat-num { font-size: 20px; font-weight: 700; line-height: 1; }
  .stat-lbl { font-size: 10px; color: #9ca3af; margin-top: 3px; }

  /* Filter tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
  .tab { font-size: 11px; padding: 4px 10px; border-radius: 999px; border: 1px solid #e5e7eb; background: white; color: #6b7280; cursor: pointer; font-family: inherit; }
  .tab.active { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; font-weight: 500; }

  /* Lead cards */
  .lead-card { background: white; border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px; margin-bottom: 8px; border-left-width: 3px; }
  .lc-strong { border-left-color: #16a34a; }
  .lc-possible { border-left-color: #d97706; }
  .lc-skip { border-left-color: #dc2626; }

  .avatar { width: 36px; height: 36px; border-radius: 50%; background: #dbeafe; color: #1d4ed8; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .lead-name { font-size: 13px; font-weight: 600; line-height: 1.3; }
  .lead-title { font-size: 11px; color: #6b7280; margin-top: 2px; line-height: 1.4; }

  .score-num { font-size: 20px; font-weight: 700; line-height: 1; }
  .sc-high { color: #16a34a; }
  .sc-mid { color: #d97706; }
  .sc-low { color: #dc2626; }

  .badge { font-size: 10px; padding: 2px 8px; border-radius: 999px; display: inline-block; font-weight: 500; }
  .b-strong { background: #dcfce7; color: #15803d; }
  .b-possible { background: #fef3c7; color: #92400e; }
  .b-skip { background: #fee2e2; color: #991b1b; }
  .b-av { background: #e0e7ff; color: #4338ca; }

  .signals { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .signal { font-size: 10px; padding: 2px 8px; border-radius: 999px; background: #f9fafb; color: #6b7280; border: 1px solid #e5e7eb; }
  .reasoning { font-size: 11px; color: #6b7280; margin-top: 7px; line-height: 1.5; }

  .action-badge { font-size: 11px; padding: 3px 10px; border-radius: 6px; border: 1px solid; cursor: default; }
  .ab-book { background: #f0fdf4; color: #15803d; border-color: #86efac; }
  .ab-audit { background: #eff6ff; color: #1e40af; border-color: #93c5fd; }
  .ab-nurture { background: #fffbeb; color: #92400e; border-color: #fcd34d; }
  .ab-skip { background: #f9fafb; color: #9ca3af; border-color: #e5e7eb; }

  /* Provider cards */
  .prov-card { border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px 12px; cursor: pointer; background: white; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; transition: border-color 0.15s; }
  .prov-card:hover { border-color: #93c5fd; }
  .prov-card.sel { border: 1.5px solid #0a66c2; background: #eff6ff; }
  .prov-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .prov-name { font-size: 13px; font-weight: 500; }
  .prov-sub { font-size: 11px; color: #9ca3af; }

  /* Misc */
  .section-lbl { font-size: 11px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .divider { border: none; border-top: 1px solid #f3f4f6; margin: 14px 0; }
  .empty { text-align: center; padding: 32px 16px; color: #9ca3af; }
  .empty-icon { font-size: 28px; margin-bottom: 8px; }
  .empty p { font-size: 12px; line-height: 1.5; }
  a { color: #0a66c2; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .info-box { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: 10px 12px; }
  .info-box p { font-size: 12px; color: #1d4ed8; line-height: 1.5; }

  #results-list { padding-bottom: 4px; }
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:2px;">
    <span class="header-logo">⚡</span>
    <div>
      <div class="header-title">Lead Scorer</div>
      <div class="header-sub">LinkedIn · Avatar A & B · Fresu Electronics</div>
    </div>
  </div>
  <button class="icon-btn" id="btn-settings-hdr" title="Settings">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>
</header>
<main id="root">
  <div class="empty"><div class="empty-icon">⚡</div><p>Loading...</p></div>
</main>
<script src="sidepanel.js"></script>
</body>
</html>
